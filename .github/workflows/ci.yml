name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install evaluation-tool dependencies
        working-directory: evals
        run: bun install --frozen-lockfile

      - name: Run repository gates
        run: bun run ci

      - name: Validate evaluation tooling
        working-directory: evals
        run: bun run test:validation

      - name: Audit production dependencies
        run: bun audit --production

      - name: Audit evaluation-tool dependencies
        working-directory: evals
        run: bun audit --production

      - name: Verify release metadata
        run: bun run release:check

      - name: Verify package contents
        run: bun run release:pack

  node-smoke:
    name: Node ${{ matrix.node }} package smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Import core package with Node.js
        run: >-
          node --input-type=module --eval
          "import('./packages/core/dist/index.js').then(({ compile, evaluate }) => {
          const result = evaluate(compile('$.value * 2'), { value: 21 });
          if (result !== 42) process.exit(1); })"

      - name: Execute CLI package with Node.js
        run: printf '{"name":"Ada"}\n' | node packages/cli/dist/index.js '.name' | grep -q '"Ada"'
