name: Update dependencies

on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  update:
    if: github.repository == 'cristianmartinez/yexp'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Update workspace dependencies
        run: bun update

      - name: Update evaluation-tool dependencies
        working-directory: evals
        run: bun update

      - name: Create or refresh dependency pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch='automation/dependency-updates'
          git fetch origin "$branch" || true
          git switch --force-create "$branch"
          git add -- package.json bun.lock 'packages/*/package.json' evals/package.json evals/bun.lock

          if git diff --cached --quiet; then
            echo 'Dependencies are already current.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'build(deps): update Bun dependencies'
          git push --force-with-lease origin "HEAD:refs/heads/$branch"

          if gh pr list --head "$branch" --state open --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title 'build(deps): update Bun dependencies' \
              --body 'Updates dependencies within the repository declared version ranges and refreshes both Bun lockfiles. CI validates the resulting packages and application.'
          fi
