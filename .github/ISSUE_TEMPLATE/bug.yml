name: Bug report
description: Report reproducible incorrect behavior in Yexp
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Yexp. Do not report security vulnerabilities here; use the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, commit, or playground deployment
    validations:
      required: true
  - type: textarea
    id: expression
    attributes:
      label: Expression and input
      description: Provide a minimal expression and JSON-like input.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Core library
        - CLI
        - Playground or documentation
        - Other
    validations:
      required: true
