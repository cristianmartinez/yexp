name: Feature proposal
description: Propose a language, runtime, CLI, or documentation improvement
title: "proposal: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should Yexp solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include example expressions or API usage when possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and portability
      description: What alternatives were considered, and how should this behave across runtimes?
    validations:
      required: true
